{{/*
Postgres — system of record. Deployment (not StatefulSet: single replica,
single RWO PVC, Recreate strategy so the old pod always fully terminates
before the new one mounts the volume — no split-brain writer).

TIER-LABEL BOUNDARY: this pod template uses the shared octoconv.labels
(part-of=octoconv) but MUST NOT carry octoconv.io/tier: app. That label is
reserved for the 5 app Deployments added in plan 02; the plan-02 metrics
NetworkPolicy podSelector matches exactly on octoconv.io/tier: app, so
keeping it off postgres is what prevents the default-deny policy from
black-holing 5432.

Service metadata.name stays the literal "postgres" (not fullname-prefixed)
so the FQDN contract in the ConfigMap/Secret
(postgres.octoconv.svc.cluster.local) resolves exactly per D-06.
*/}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  labels:
    {{- include "octoconv.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    {{- include "octoconv.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "octoconv.selectorLabels" (dict "component" "postgres" "root" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "octoconv.labels" . | nindent 8 }}
        {{- include "octoconv.selectorLabels" (dict "component" "postgres" "root" $) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octoconv-secret
                  key: POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
          # Same mount path as docker-compose's postgres_data:/var/lib/postgresql
          # (NOT /data) — match compose precisely so the proven config carries over.
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.db | quote }}]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.db | quote }}]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "octoconv.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    {{- include "octoconv.selectorLabels" (dict "component" "postgres" "root" $) | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
