{{/*
Redis — transient asynq broker (no PVC; Postgres is the system of record).

TIER-LABEL BOUNDARY: see templates/postgres.yaml — this pod template MUST
NOT carry octoconv.io/tier: app (reserved for plan 02's app Deployments).

Service metadata.name stays the literal "redis" (FQDN contract, D-06).
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    {{- include "octoconv.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "octoconv.selectorLabels" (dict "component" "redis" "root" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "octoconv.labels" . | nindent 8 }}
        {{- include "octoconv.selectorLabels" (dict "component" "redis" "root" $) | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "octoconv.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "octoconv.selectorLabels" (dict "component" "redis" "root" $) | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
