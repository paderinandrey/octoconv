{{/*
KEDA ScaledObject — document worker (LibreOffice/PDF pipeline). Scales the
`document-worker` Deployment from 0 on
sum(octoconv_queue_depth{queue="document", state=~"pending|active"}) via
the Prometheus scaler (D-04 — pending+active only, never
retry/scheduled/archived).

CO-DEPENDENCY GUARD: see scaledobject-image.yaml header — gated on BOTH
keda.enabled AND prometheus.enabled together.

SCALE-DOWN STABILIZATION (Phase 28 D-07/D-08, RESEARCH.md Pitfall 1):
cooldownPeriod above governs ONLY the 1→0 transition. The N→N-1 (N>1) step
(e.g. the 2→1 downscale the load-proof's SC3 scenario exercises) is governed
by the standard Kubernetes HPA, whose scaleDown.stabilizationWindowSeconds
defaults to 300s — long enough to push the downscale decision past a long
document job's own DOCUMENT_ENGINE_TIMEOUT (300s) and silently invalidate
SC3's timing assumptions. keda.document.scaleDownStabilizationSeconds below
overrides ONLY that HPA window; it defaults to null (production keeps the
k8s 300s default) and is set to a fast value ONLY by the load-proof overlay
(values-loadproof.yaml). Do not conflate this knob with cooldownPeriod.
*/}}
{{- if and .Values.keda.enabled .Values.prometheus.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-document-scaledobject
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "octoconv.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    name: document-worker
  minReplicaCount: 0
  maxReplicaCount: {{ .Values.keda.document.maxReplicaCount }}
  pollingInterval: {{ .Values.keda.document.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.document.cooldownPeriod }}
  {{- if .Values.keda.document.scaleDownStabilizationSeconds }}
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: {{ .Values.keda.document.scaleDownStabilizationSeconds }}
          policies:
            - type: Pods
              value: 1
              periodSeconds: 15
  {{- end }}
  fallback:
    failureThreshold: 3
    replicas: 1
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.{{ .Values.global.namespace }}.svc.cluster.local:9090
        query: sum(octoconv_queue_depth{queue="document", state=~"pending|active"})
        threshold: {{ .Values.keda.document.threshold | quote }}
        # An empty PromQL result (genuinely empty queue) is treated as 0,
        # NOT a scaler failure — false would make a routine api restart
        # spuriously trip fallback.replicas across this class (Pitfall 4).
        ignoreNullValues: "true"
{{- end }}
