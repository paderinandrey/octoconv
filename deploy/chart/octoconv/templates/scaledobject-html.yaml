{{/*
KEDA ScaledObject — html worker (Chromium PDF rendering). Scales the
`chromium-worker` Deployment from 0 on the summed octoconv_queue_depth for
queue html, counting pending + active + retry states, via the Prometheus
scaler (D-03 — retry-inclusive, never scheduled/archived. Retry-state
tasks are imminent work; excluding them left a zeroed class blind to a
retry backlog until the reconciler's next sweep, ~12.6 min worst case).

CO-DEPENDENCY GUARD: see scaledobject-image.yaml header — gated on BOTH
keda.enabled AND prometheus.enabled together.
*/}}
{{- if and .Values.keda.enabled .Values.prometheus.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-html-scaledobject
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "octoconv.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    name: chromium-worker
  minReplicaCount: 0
  maxReplicaCount: {{ .Values.keda.html.maxReplicaCount }}
  pollingInterval: {{ .Values.keda.html.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.html.cooldownPeriod }}
  fallback:
    failureThreshold: 3
    replicas: 1
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.{{ .Values.global.namespace }}.svc.cluster.local:9090
        query: sum(octoconv_queue_depth{queue="html", state=~"pending|active|retry"})
        threshold: {{ .Values.keda.html.threshold | quote }}
        # Sustained absence of a PromQL result (e.g. api unreachable or
        # unscrapeable) now reads as a scaler ERROR, not queue-empty (D-01)
        # — fallback.replicas: 1 holds one replica for this class instead
        # of falsely scaling to zero with a live backlog behind an outage.
        # Trade-off: a benign one-shot fallback blip is possible on fresh
        # install / a short api restart before the first enqueue — accepted,
        # fail-safe toward availability (same philosophy as webhook-worker's
        # fail-closed default).
        ignoreNullValues: "false"
{{- end }}
