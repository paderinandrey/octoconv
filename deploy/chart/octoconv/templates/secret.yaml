{{/*
Dev credentials Secret. Every value is pulled from .Values.secrets.* (set
in values-local.yaml) — this committed template never contains a literal
secret (T-24-03). WEBHOOK_ALLOW_PRIVATE_IPS / WEBHOOK_ALLOW_INSECURE_HTTP
are deliberately absent: both default to false (safe, production SSRF
guard) when unset, and are relaxed ONLY in plan 03's e2e overlay.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: octoconv-secret
  labels:
    {{- include "octoconv.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgres://{{ .Values.postgres.user }}:{{ .Values.secrets.postgresPassword }}@postgres.octoconv.svc.cluster.local:5432/{{ .Values.postgres.db }}"
  REDIS_ADDR: "redis:6379"
  API_KEY_SALT: {{ .Values.secrets.apiKeySalt | quote }}
  WEBHOOK_SIGNING_SECRET: {{ .Values.secrets.webhookSigningSecret | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
