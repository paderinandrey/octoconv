{{- if .Values.asynqmon.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: asynqmon
  labels:
    {{- include "octoconv.labels" . | nindent 4 }}
    app.kubernetes.io/component: asynqmon
spec:
  type: ClusterIP
  selector:
    {{- include "octoconv.selectorLabels" (dict "component" "asynqmon" "root" $) | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}
