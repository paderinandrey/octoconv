# Default values for octoconv.
#
# This is the COMPLETE per-service value contract for the whole phase
# (interface-first). Plans 02/03 ADD templates that consume these keys —
# they do NOT edit this file. Real dev-credential values live in
# values-local.yaml, never here.

global:
  imageTag: "dev"
  namespace: "octoconv"

image:
  registry: ""
  pullPolicy: "IfNotPresent"

metrics:
  # 0.0.0.0 (not 127.0.0.1 like compose) — each binary runs in its own pod,
  # so there is no shared loopback to bind to. D-04.
  addr: "0.0.0.0:9090"

s3:
  # FQDN, not the compose bare "minio:9000" — presigned URLs must resolve
  # from pods AND from the OrbStack host. D-06.
  endpoint: "minio.octoconv.svc.cluster.local:9000"
  bucket: "octoconv"
  useSSL: "false"

# Per-service app blocks. Consumed by plan 02's Deployments; defined now so
# plan 02 never needs to touch this file.
api:
  image:
    repository: "octoconv-api"
  replicas: 1
  # OPER-01/D-01: comma-separated operator client UUIDs authorized for
  # /v1/system/presets; empty = no operators, fail-closed. Parsed once at
  # API startup -- changing this value requires an API restart.
  operatorClientIds: ""

worker:
  image:
    repository: "octoconv-worker"
  replicas: 1
  terminationGracePeriodSeconds: 150
  resources:
    limits:
      cpu: "2"
      memory: "1Gi"

documentWorker:
  image:
    repository: "octoconv-document-worker"
  replicas: 1
  terminationGracePeriodSeconds: 330
  resources:
    limits:
      cpu: "2"
      memory: "1Gi"

chromiumWorker:
  image:
    repository: "octoconv-chromium-worker"
  replicas: 1
  terminationGracePeriodSeconds: 90
  shmSize: "256Mi"
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"

webhookWorker:
  image:
    repository: "octoconv-webhook-worker"
  replicas: 2
  terminationGracePeriodSeconds: 60

asynqmon:
  enabled: false
  image:
    repository: "hibiken/asynqmon"
    tag: "0.7.2"

# mcp-http (Phase 25, MCPH-01): streamable-HTTP MCP endpoint. Key-free env —
# only OCTOCONV_BASE_URL + MCP_HTTP_ADDR (D-06); the pod never reads an API
# key or DB/S3 secret. Default true so `helm install` brings it up alongside
# the rest of the app tier (D-05).
mcpHttp:
  enabled: true
  image:
    repository: "octoconv-mcp-http"
  replicas: 1
  addr: ":8070"
  # FQDN, same convention as s3.endpoint above — must resolve from the
  # mcp-http pod (D-06).
  baseURL: "http://api.octoconv.svc.cluster.local:8090"

# Stateful backbone — hand-rolled (D-02), same pinned images as compose.
postgres:
  image: "postgres:18"
  storage: "2Gi"
  db: "octo_db"
  user: "octo"

redis:
  # No PVC — asynq treats Redis as a transient broker; Postgres is the
  # system of record.
  image: "redis:8"

minio:
  # Concrete RELEASE tags — never :latest. OrbStack re-pulls :latest even
  # from its shared local image store (D-02 landmine fix).
  image: "minio/minio:RELEASE.2025-09-07T16-13-09Z"
  mcImage: "minio/mc:RELEASE.2025-08-13T08-35-41Z"
  storage: "5Gi"
  rootUser: "minioadmin"
  rootPassword: "minioadmin"

# Consumed by plan 03's E2E overlay; declared now so values.yaml never
# needs another edit.
e2e:
  image: "octoconv-e2e"
  enabled: false

# Phase 27 (KEDA-02): minimal in-chart Prometheus (Deployment+ConfigMap+
# Service), scraping api's relocated octoconv_queue_depth metric so KEDA's
# Prometheus scaler has something to query. Default false (D-10) — base
# chart installs on a cluster without KEDA CRDs or Prometheus at all.
prometheus:
  enabled: false
  image: "prom/prometheus:v3.13.1"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# Phase 27 (KEDA-02): per-class ScaledObject trigger values. Gated on BOTH
# keda.enabled AND prometheus.enabled together (scaledobject-*.yaml) — a
# ScaledObject's trigger points at the in-chart Prometheus Service, so it
# must never render unless that Service also renders. Default false (D-10).
# webhook class deliberately has NO block here — it is hard-excluded from
# autoscaling (D-09), fixed at replicas: 2 in webhookWorker above.
# These are demo starting values; production tuning is Phase 28.
keda:
  enabled: false
  image:
    threshold: "5"
    maxReplicaCount: 4
    pollingInterval: 5
    cooldownPeriod: 60
  document:
    threshold: "1"
    maxReplicaCount: 2
    pollingInterval: 15
    cooldownPeriod: 120
  html:
    threshold: "2"
    maxReplicaCount: 2
    pollingInterval: 10
    cooldownPeriod: 90
