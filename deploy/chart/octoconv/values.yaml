# Default values for octoconv.
#
# This is the COMPLETE per-service value contract for the whole phase
# (interface-first). Plans 02/03 ADD templates that consume these keys —
# they do NOT edit this file. Real dev-credential values live in
# values-local.yaml, never here.

global:
  imageTag: "dev"
  namespace: "octoconv"

image:
  registry: ""
  pullPolicy: "IfNotPresent"

metrics:
  # 0.0.0.0 (not 127.0.0.1 like compose) — each binary runs in its own pod,
  # so there is no shared loopback to bind to. D-04.
  addr: "0.0.0.0:9090"

s3:
  # FQDN, not the compose bare "minio:9000" — presigned URLs must resolve
  # from pods AND from the OrbStack host. D-06.
  endpoint: "minio.octoconv.svc.cluster.local:9000"
  bucket: "octoconv"
  useSSL: "false"

# Per-service app blocks. Consumed by plan 02's Deployments; defined now so
# plan 02 never needs to touch this file.
api:
  image:
    repository: "octoconv-api"
  replicas: 1

worker:
  image:
    repository: "octoconv-worker"
  replicas: 1
  terminationGracePeriodSeconds: 150
  resources:
    limits:
      cpu: "2"
      memory: "1Gi"

documentWorker:
  image:
    repository: "octoconv-document-worker"
  replicas: 1
  terminationGracePeriodSeconds: 330
  resources:
    limits:
      cpu: "2"
      memory: "1Gi"

chromiumWorker:
  image:
    repository: "octoconv-chromium-worker"
  replicas: 1
  terminationGracePeriodSeconds: 90
  shmSize: "256Mi"
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"

webhookWorker:
  image:
    repository: "octoconv-webhook-worker"
  replicas: 2
  terminationGracePeriodSeconds: 60

asynqmon:
  enabled: false
  image:
    repository: "hibiken/asynqmon"
    tag: "0.7.2"

# Stateful backbone — hand-rolled (D-02), same pinned images as compose.
postgres:
  image: "postgres:18"
  storage: "2Gi"
  db: "octo_db"
  user: "octo"

redis:
  # No PVC — asynq treats Redis as a transient broker; Postgres is the
  # system of record.
  image: "redis:8"

minio:
  # Concrete RELEASE tags — never :latest. OrbStack re-pulls :latest even
  # from its shared local image store (D-02 landmine fix).
  image: "minio/minio:RELEASE.2025-09-07T16-13-09Z"
  mcImage: "minio/mc:RELEASE.2025-08-13T08-35-41Z"
  storage: "5Gi"
  rootUser: "minioadmin"
  rootPassword: "minioadmin"

# Consumed by plan 03's E2E overlay; declared now so values.yaml never
# needs another edit.
e2e:
  image: "octoconv-e2e"
  enabled: false
