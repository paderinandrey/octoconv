# docker-compose.e2e.yml — E2E-ONLY compose override for Phase 11 Plan 02/03.
#
# This file exists SOLELY to support the live end-to-end test harness
# (internal/e2e/e2e_test.go) and MUST NEVER be used in production. It
# deliberately relaxes the webhook SSRF guard (WEBHOOK_ALLOW_PRIVATE_IPS,
# WEBHOOK_ALLOW_INSECURE_HTTP) so the E2E suite's httptest-based webhook
# receiver, reachable at host.docker.internal from inside the compose
# network, can accept a plain-http callback_url pointing at a private
# host-gateway address (T-11-04). Always run it layered on top of the base
# file, never standalone:
#
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --build
#
# The production docker-compose.yml keeps the SSRF guard fully engaged;
# nothing in this override file is copied there.
#
# KEDA-01/D-03 (Phase 27 Plan 01): the api.ports and worker.ports/environment
# blocks below publish the loopback-bound METRICS_ADDR to the host so the Go
# E2E test (TestQueueDepthMetricRelocationE2E) can GET :9090/metrics directly
# — the runtime images ship no curl/wget/shell fetch tool, so a plain host-run
# HTTP GET against a host-published port is the only reachability mechanism
# available. VALIDATION-ONLY: base docker-compose.yml keeps METRICS_ADDR at
# 127.0.0.1:9090 (loopback, unpublished) in production; these overrides are
# never copied there.
services:
  api:
    environment:
      WEBHOOK_ALLOW_PRIVATE_IPS: "true"
      WEBHOOK_ALLOW_INSECURE_HTTP: "true"
      # E2E-only: the suite's status polling (many jobs back-to-back, all from
      # the single docker-bridge gateway IP) exceeds the production defaults
      # (60 ip-rpm / 120 client-rpm) on fast CI runners — first observed as a
      # 429 cascade on the initial GitHub Actions run. Production compose
      # keeps the real limits; only tests relax them.
      RATE_LIMIT_IP_RPM: "6000"
      RATE_LIMIT_CLIENT_RPM: "6000"
      # KEDA-01/D-03: bind /metrics to all interfaces so the host-published
      # port below is reachable; validation-only, never shipped to production.
      METRICS_ADDR: "0.0.0.0:9090"
    # validateCallbackURL runs inside the api process at job-creation time
    # (net.LookupHost), so api itself needs the host-gateway alias too — not
    # just the webhook-worker services which actually deliver the webhook
    # (DEBT-01/WR-02). Without this, plain-Linux docker cannot resolve
    # host.docker.internal and every callback_url is rejected with 400 before
    # any conversion runs.
    #
    # WEBHOOK_ALLOW_PRIVATE_IPS/WEBHOOK_ALLOW_INSECURE_HTTP stay ONLY here on
    # the api service — that's the creation-time SSRF guard (validateCallbackURL),
    # not a webhook-worker concern; do NOT add them to webhook-worker-1/-2.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # KEDA-01/D-03: host-published metrics port proving api now serves
      # octoconv_queue_depth for all four queues (relocation assertion).
      - "9190:9090"

  # KEDA-01/D-03 (Phase 27 Plan 01): image worker's metrics port, published so
  # TestQueueDepthMetricRelocationE2E can assert it NO LONGER serves
  # octoconv_queue_depth (relocation proof) while still returning HTTP 200
  # (endpoint retained). Representative spot-check for all four workers — see
  # 27-01-PLAN.md's scope note; the other three workers' collector removal is
  # proven statically by Task 1's `grep -rl`/`go vet` gate.
  worker:
    environment:
      METRICS_ADDR: "0.0.0.0:9090"
    ports:
      - "9191:9090"

  # webhook-worker-1/-2 deliver webhooks (HandleWebhookDeliver, Phase 16) —
  # they are the processes that actually dial the E2E test's host-bound
  # receiver. Neither the image worker nor document-worker deliver webhooks
  # anymore (D-03/D-06), so their overrides below were removed.
  webhook-worker-1:
    extra_hosts:
      - "host.docker.internal:host-gateway"

  webhook-worker-2:
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # chromium-worker needs the host-gateway alias for the Plan 04/05
  # network-block canary test (D-04) — the canary receiver runs in the Go
  # E2E test process on the host, reachable at host.docker.internal from
  # inside the compose network. Unrelated to webhook delivery — retained
  # unchanged.
  chromium-worker:
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # document-worker: E2E-ONLY fault-injection shim for the veraPDF live
  # terminal-fail gate (Phase 23 Plan 03, D-09). NEVER present in production
  # docker-compose.yml. A single-file, read-only bind mount SHADOWS the real
  # /usr/bin/soffice binary by placing the shim at /usr/local/bin/soffice,
  # which the image's PATH resolves AHEAD of /usr/bin (no PATH env override
  # -- WARNING-6). The shim is transparent pass-through
  # (`exec /usr/bin/soffice "$@"`) for every input except the deliberate
  # trigger.docx fixture, for which it substitutes a pre-crafted
  # marker-bearing-but-non-compliant PDF -- exercising the REAL veraPDF JVM,
  # terminal classification, and job_events diagnostics trail end-to-end.
  # Both mounted files must stay world-readable/executable: the worker
  # container runs as USER nobody.
  document-worker:
    volumes:
      - ./internal/e2e/testdata/verapdf-shim/soffice:/usr/local/bin/soffice:ro
      - ./internal/e2e/testdata/verapdf_noncompliant_marker.pdf:/e2e-fixtures/verapdf_noncompliant_marker.pdf:ro
