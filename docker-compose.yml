services:
  postgres:
    image: postgres:18
    container_name: octoconv-db
    restart: always
    environment:
      POSTGRES_USER: octo
      POSTGRES_PASSWORD: octo-pass
      POSTGRES_DB: octo_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octo -d octo_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8
    container_name: octoconv-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: octoconv-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job: create the bucket on startup.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/octoconv;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: octoconv-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      API_ADDR: ":8080"
      MAX_UPLOAD_BYTES: "104857600"
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: octoconv-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      WORKER_CONCURRENCY: "4"
      ENGINE_TIMEOUT: "120s"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
