services:
  postgres:
    image: postgres:18
    container_name: octoconv-db
    restart: always
    environment:
      POSTGRES_USER: octo
      POSTGRES_PASSWORD: octo-pass
      POSTGRES_DB: octo_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octo -d octo_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8
    container_name: octoconv-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: octoconv-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job: create the bucket on startup.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/octoconv;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: octoconv-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      API_ADDR: ":8090"
      MAX_UPLOAD_BYTES: "104857600"
      MAX_IMAGE_PIXELS: "100000000"
      MAX_DOCUMENT_UNCOMPRESSED_BYTES: "524288000"
      API_KEY_SALT: "dev-only-change-me-in-real-deploys"
      # OPER-01/D-01: comma-separated operator client UUIDs authorized for
      # /v1/system/presets; empty = no operators, fail-closed (mirrors
      # deploy/chart/octoconv/values.yaml's api.operatorClientIds comment).
      # Parsed once at API startup -- changing this value requires an api
      # container restart/recreate to take effect (D-05).
      OPERATOR_CLIENT_IDS: "${OPERATOR_CLIENT_IDS:-}"
      RATE_LIMIT_IP_RPM: "60"
      RATE_LIMIT_CLIENT_RPM: "120"
      # queue.NewClient() (constructed by cmd/api/main.go) reads these vars
      # UNCONDITIONALLY, even though the api process only enqueues (it
      # never runs the engine) -- DEBT-05.
      IMAGE_MAX_RETRY: "4"
      ENGINE_TIMEOUT: "120s"
      DOCUMENT_MAX_RETRY: "3"
      DOCUMENT_ENGINE_TIMEOUT: "300s"
      HTML_MAX_RETRY: "3"
      HTML_ENGINE_TIMEOUT: "60s"
      # IN-02: queue.NewClient() derives audioUniqueTTL from these unconditionally
      # in EVERY process -- must be identical across all 7 queue.NewClient()-
      # constructing services (RTF-measured, 32-03-SUMMARY.md).
      AUDIO_MAX_RETRY: "3"
      AUDIO_ENGINE_TIMEOUT: "742s"
      STORAGE_TTL: "168h"
      METRICS_ADDR: "127.0.0.1:9090"
      # WEBHOOK_ALLOW_PRIVATE_IPS / WEBHOOK_ALLOW_INSECURE_HTTP: deliberately
      # omitted here. Both default to false (safe) when unset, and this is
      # the production SSRF guard for callback_url -- it must stay
      # default-off in base compose. Only docker-compose.e2e.yml is
      # permitted to relax them, for the in-test webhook receiver (DEBT-05).
    ports:
      - "8090:8090"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: octoconv-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      WORKER_CONCURRENCY: "4"
      ENGINE_TIMEOUT: "120s"
      IMAGE_MAX_RETRY: "4"
      # queue.NewClient() (constructed by cmd/worker/main.go) also reads the
      # document-side and html-side retry/timeout vars unconditionally, even
      # though this process only runs the image engine (DEBT-05).
      DOCUMENT_MAX_RETRY: "3"
      DOCUMENT_ENGINE_TIMEOUT: "300s"
      HTML_MAX_RETRY: "3"
      HTML_ENGINE_TIMEOUT: "60s"
      # IN-02: queue.NewClient() derives audioUniqueTTL from these unconditionally
      # in EVERY process -- must be identical across all 7 queue.NewClient()-
      # constructing services (RTF-measured, 32-03-SUMMARY.md).
      AUDIO_MAX_RETRY: "3"
      AUDIO_ENGINE_TIMEOUT: "742s"
      METRICS_ADDR: "127.0.0.1:9090"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  # Two symmetric webhook-worker replicas (not deploy.replicas, which
  # docker-compose ignores without swarm mode) -- this is the real ≥2-consumer
  # redundancy required by D-05/T-16-09/SC2: killing either one still leaves
  # the other draining the webhook queue. Both are identical, no
  # primary/secondary distinction.
  webhook-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.webhook-worker
    container_name: octoconv-webhook-worker-1
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      WEBHOOK_WORKER_CONCURRENCY: "4"
      WEBHOOK_SIGNING_SECRET: "dev-only-change-me-in-real-deploys"
      WEBHOOK_PRESIGN_TTL: "6h"
      RECONCILER_QUEUED_STALE_AFTER: "90s"
      # Restored to the Phase-31 code default (was a stale Phase-16 "5m"
      # override) -- MUST stay strictly above every AUDIO_ENGINE_TIMEOUT
      # below, or the reconciler recovers still-running audio jobs,
      # reopening the T-03-10 double-processing race (32-03-SUMMARY.md).
      RECONCILER_ACTIVE_STALE_AFTER: "15m"
      RECONCILER_SWEEP_INTERVAL: "1m"
      RECONCILER_MAX_RECOVERIES: "3"
      # IN-02: queue.NewClient() derives audioUniqueTTL from these
      # unconditionally in EVERY process -- must be identical across all 7
      # queue.NewClient()-constructing services (RTF-measured,
      # 32-03-SUMMARY.md). webhook-worker previously omitted ALL
      # engine-class MAX_RETRY/TIMEOUT vars; this phase closes the gap for
      # AUDIO_* only (DOCUMENT_*/HTML_* omission here is pre-existing and
      # out of scope).
      AUDIO_MAX_RETRY: "3"
      AUDIO_ENGINE_TIMEOUT: "742s"
      METRICS_ADDR: "127.0.0.1:9090"

  webhook-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.webhook-worker
    container_name: octoconv-webhook-worker-2
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      WEBHOOK_WORKER_CONCURRENCY: "4"
      WEBHOOK_SIGNING_SECRET: "dev-only-change-me-in-real-deploys"
      WEBHOOK_PRESIGN_TTL: "6h"
      RECONCILER_QUEUED_STALE_AFTER: "90s"
      # Restored to the Phase-31 code default (was a stale Phase-16 "5m"
      # override) -- MUST stay strictly above every AUDIO_ENGINE_TIMEOUT
      # below, or the reconciler recovers still-running audio jobs,
      # reopening the T-03-10 double-processing race (32-03-SUMMARY.md).
      RECONCILER_ACTIVE_STALE_AFTER: "15m"
      RECONCILER_SWEEP_INTERVAL: "1m"
      RECONCILER_MAX_RECOVERIES: "3"
      # IN-02: queue.NewClient() derives audioUniqueTTL from these
      # unconditionally in EVERY process -- must be identical across all 7
      # queue.NewClient()-constructing services (RTF-measured,
      # 32-03-SUMMARY.md). webhook-worker previously omitted ALL
      # engine-class MAX_RETRY/TIMEOUT vars; this phase closes the gap for
      # AUDIO_* only (DOCUMENT_*/HTML_* omission here is pre-existing and
      # out of scope).
      AUDIO_MAX_RETRY: "3"
      AUDIO_ENGINE_TIMEOUT: "742s"
      METRICS_ADDR: "127.0.0.1:9090"

  document-worker:
    # veraPDF (PDFA-02, D-03) is bundled into this image from the pinned
    # verapdf/cli:v1.30.2 Docker Hub image, which is published amd64-only
    # (verified live against the registry, 23-01) -- pin the whole service
    # to linux/amd64 so the build (and any arm64 host, e.g. Apple Silicon
    # dev machines) doesn't accidentally cross-copy incompatible
    # architecture binaries into the runtime stage.
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.document-worker
    container_name: octoconv-document-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      DOCUMENT_WORKER_CONCURRENCY: "2"
      DOCUMENT_ENGINE_TIMEOUT: "300s"
      # queue.NewClient() (constructed by cmd/document-worker/main.go) also
      # reads the image-side and html-side retry/timeout vars and
      # DOCUMENT_MAX_RETRY unconditionally, even though this process only
      # runs the document engine (DEBT-05).
      IMAGE_MAX_RETRY: "4"
      ENGINE_TIMEOUT: "120s"
      DOCUMENT_MAX_RETRY: "3"
      HTML_MAX_RETRY: "3"
      HTML_ENGINE_TIMEOUT: "60s"
      # IN-02: queue.NewClient() derives audioUniqueTTL from these unconditionally
      # in EVERY process -- must be identical across all 7 queue.NewClient()-
      # constructing services (RTF-measured, 32-03-SUMMARY.md).
      AUDIO_MAX_RETRY: "3"
      AUDIO_ENGINE_TIMEOUT: "742s"
      VERAPDF_TIMEOUT: "60s"
      METRICS_ADDR: "127.0.0.1:9090"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  chromium-worker:
    build:
      context: .
      dockerfile: Dockerfile.chromium-worker
    container_name: octoconv-chromium-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      HTML_WORKER_CONCURRENCY: "2"
      HTML_ENGINE_TIMEOUT: "60s"
      HTML_MAX_RETRY: "3"
      # queue.NewClient() (constructed by cmd/chromium-worker/main.go) also
      # reads the image-side and document-side retry/timeout vars
      # unconditionally, even though this process only runs the html engine
      # (DEBT-05).
      IMAGE_MAX_RETRY: "4"
      ENGINE_TIMEOUT: "120s"
      DOCUMENT_MAX_RETRY: "3"
      DOCUMENT_ENGINE_TIMEOUT: "300s"
      # IN-02: queue.NewClient() derives audioUniqueTTL from these unconditionally
      # in EVERY process -- must be identical across all 7 queue.NewClient()-
      # constructing services (RTF-measured, 32-03-SUMMARY.md).
      AUDIO_MAX_RETRY: "3"
      AUDIO_ENGINE_TIMEOUT: "742s"
      METRICS_ADDR: "127.0.0.1:9090"
    # /dev/shm sizing as a belt-and-suspenders compensating control
    # alongside the --disable-dev-shm-usage argv flag (D-09/Pitfall C) --
    # some Chromium internal code paths still touch /dev/shm even with that
    # flag set.
    shm_size: "256m"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  # whisper.cpp is source-built with -DGGML_NATIVE=OFF, portable across
  # arm64/amd64 hosts -- no platform: pin needed (chromium-worker precedent,
  # unlike document-worker's veraPDF-forced amd64 pin).
  audio-worker:
    build:
      context: .
      dockerfile: Dockerfile.audio-worker
    container_name: octoconv-audio-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      AUDIO_WORKER_CONCURRENCY: "1"
      # RTF-measured (Phase 32 AUD-07, scripts/audio-rtf-measure.sh, p95
      # RTF=0.205853 on this exact --cpus/--memory container), NOT the old
      # 600s placeholder -- see 32-03-SUMMARY.md for the full derivation.
      AUDIO_ENGINE_TIMEOUT: "742s"
      AUDIO_MAX_RETRY: "3"
      # Lowered from the 14400s (4h) placeholder via the documented
      # NO-GO lever -- the original ceiling's derived timeout (1349s)
      # breached the 900s/15m reconciler CAP (32-03-SUMMARY.md).
      AUDIO_MAX_DURATION_SECONDS: "1800"
      AUDIO_MODEL_PATH: "/models/ggml-base.bin"
      # AUDIO_THREADS: left unset -- cgroup auto-detection (Plan 02) derives
      # -t 2 at runtime from this service's own --cpus=2.0 limit below,
      # matching the RTF measurement container exactly.
      # queue.NewClient() (constructed by cmd/audio-worker/main.go) also
      # reads the image/document/html-side retry/timeout vars
      # unconditionally, even though this process only runs the audio
      # engine (DEBT-05).
      IMAGE_MAX_RETRY: "4"
      ENGINE_TIMEOUT: "120s"
      DOCUMENT_MAX_RETRY: "3"
      DOCUMENT_ENGINE_TIMEOUT: "300s"
      HTML_MAX_RETRY: "3"
      HTML_ENGINE_TIMEOUT: "60s"
      METRICS_ADDR: "127.0.0.1:9090"
    deploy:
      resources:
        limits:
          # Matches the RTF measurement container exactly (32-03-SUMMARY.md)
          # -- the measured 742s timeout is only valid at these limits.
          cpus: "2.0"
          memory: 1g

  # Read-only asynq queue-inspection dashboard (OBS-03). Bound to 127.0.0.1
  # only, never 0.0.0.0 — no auth layer needed since it's unreachable outside
  # the host, matching the internal-only trust model (D-18/T-04-14). Image
  # pinned to a specific published tag (not :latest) per supply-chain hygiene
  # (T-04-15) — verified against Docker Hub's tag list at plan time.
  asynqmon:
    image: hibiken/asynqmon:0.7.2
    platform: linux/amd64
    container_name: octoconv-asynqmon
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "127.0.0.1:8980:8080"

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
