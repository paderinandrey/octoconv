services:
  postgres:
    image: postgres:18
    container_name: octoconv-db
    restart: always
    environment:
      POSTGRES_USER: octo
      POSTGRES_PASSWORD: octo-pass
      POSTGRES_DB: octo_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octo -d octo_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8
    container_name: octoconv-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: octoconv-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job: create the bucket on startup.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/octoconv;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: octoconv-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      API_ADDR: ":8090"
      MAX_UPLOAD_BYTES: "104857600"
      MAX_IMAGE_PIXELS: "100000000"
      MAX_DOCUMENT_UNCOMPRESSED_BYTES: "524288000"
      API_KEY_SALT: "dev-only-change-me-in-real-deploys"
      RATE_LIMIT_IP_RPM: "60"
      RATE_LIMIT_CLIENT_RPM: "120"
      # queue.NewClient() (constructed by cmd/api/main.go) reads these vars
      # UNCONDITIONALLY, even though the api process only enqueues (it
      # never runs the engine) -- DEBT-05.
      IMAGE_MAX_RETRY: "4"
      ENGINE_TIMEOUT: "120s"
      DOCUMENT_MAX_RETRY: "3"
      DOCUMENT_ENGINE_TIMEOUT: "300s"
      HTML_MAX_RETRY: "3"
      HTML_ENGINE_TIMEOUT: "60s"
      STORAGE_TTL: "168h"
      METRICS_ADDR: "127.0.0.1:9090"
      # WEBHOOK_ALLOW_PRIVATE_IPS / WEBHOOK_ALLOW_INSECURE_HTTP: deliberately
      # omitted here. Both default to false (safe) when unset, and this is
      # the production SSRF guard for callback_url -- it must stay
      # default-off in base compose. Only docker-compose.e2e.yml is
      # permitted to relax them, for the in-test webhook receiver (DEBT-05).
    ports:
      - "8090:8090"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: octoconv-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      WORKER_CONCURRENCY: "4"
      ENGINE_TIMEOUT: "120s"
      IMAGE_MAX_RETRY: "4"
      # queue.NewClient() (constructed by cmd/worker/main.go) also reads the
      # document-side and html-side retry/timeout vars unconditionally, even
      # though this process only runs the image engine (DEBT-05).
      DOCUMENT_MAX_RETRY: "3"
      DOCUMENT_ENGINE_TIMEOUT: "300s"
      HTML_MAX_RETRY: "3"
      HTML_ENGINE_TIMEOUT: "60s"
      METRICS_ADDR: "127.0.0.1:9090"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  # Two symmetric webhook-worker replicas (not deploy.replicas, which
  # docker-compose ignores without swarm mode) -- this is the real ≥2-consumer
  # redundancy required by D-05/T-16-09/SC2: killing either one still leaves
  # the other draining the webhook queue. Both are identical, no
  # primary/secondary distinction.
  webhook-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.webhook-worker
    container_name: octoconv-webhook-worker-1
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      WEBHOOK_WORKER_CONCURRENCY: "4"
      WEBHOOK_SIGNING_SECRET: "dev-only-change-me-in-real-deploys"
      WEBHOOK_PRESIGN_TTL: "6h"
      RECONCILER_QUEUED_STALE_AFTER: "90s"
      RECONCILER_ACTIVE_STALE_AFTER: "5m"
      RECONCILER_SWEEP_INTERVAL: "1m"
      RECONCILER_MAX_RECOVERIES: "3"
      METRICS_ADDR: "127.0.0.1:9090"

  webhook-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.webhook-worker
    container_name: octoconv-webhook-worker-2
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      WEBHOOK_WORKER_CONCURRENCY: "4"
      WEBHOOK_SIGNING_SECRET: "dev-only-change-me-in-real-deploys"
      WEBHOOK_PRESIGN_TTL: "6h"
      RECONCILER_QUEUED_STALE_AFTER: "90s"
      RECONCILER_ACTIVE_STALE_AFTER: "5m"
      RECONCILER_SWEEP_INTERVAL: "1m"
      RECONCILER_MAX_RECOVERIES: "3"
      METRICS_ADDR: "127.0.0.1:9090"

  document-worker:
    build:
      context: .
      dockerfile: Dockerfile.document-worker
    container_name: octoconv-document-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      DOCUMENT_WORKER_CONCURRENCY: "2"
      DOCUMENT_ENGINE_TIMEOUT: "300s"
      # queue.NewClient() (constructed by cmd/document-worker/main.go) also
      # reads the image-side and html-side retry/timeout vars and
      # DOCUMENT_MAX_RETRY unconditionally, even though this process only
      # runs the document engine (DEBT-05).
      IMAGE_MAX_RETRY: "4"
      ENGINE_TIMEOUT: "120s"
      DOCUMENT_MAX_RETRY: "3"
      HTML_MAX_RETRY: "3"
      HTML_ENGINE_TIMEOUT: "60s"
      METRICS_ADDR: "127.0.0.1:9090"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  chromium-worker:
    build:
      context: .
      dockerfile: Dockerfile.chromium-worker
    container_name: octoconv-chromium-worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://octo:octo-pass@postgres:5432/octo_db
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: octoconv
      S3_USE_SSL: "false"
      HTML_WORKER_CONCURRENCY: "2"
      HTML_ENGINE_TIMEOUT: "60s"
      HTML_MAX_RETRY: "3"
      # queue.NewClient() (constructed by cmd/chromium-worker/main.go) also
      # reads the image-side and document-side retry/timeout vars
      # unconditionally, even though this process only runs the html engine
      # (DEBT-05).
      IMAGE_MAX_RETRY: "4"
      ENGINE_TIMEOUT: "120s"
      DOCUMENT_MAX_RETRY: "3"
      DOCUMENT_ENGINE_TIMEOUT: "300s"
      METRICS_ADDR: "127.0.0.1:9090"
    # /dev/shm sizing as a belt-and-suspenders compensating control
    # alongside the --disable-dev-shm-usage argv flag (D-09/Pitfall C) --
    # some Chromium internal code paths still touch /dev/shm even with that
    # flag set.
    shm_size: "256m"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  # Read-only asynq queue-inspection dashboard (OBS-03). Bound to 127.0.0.1
  # only, never 0.0.0.0 — no auth layer needed since it's unreachable outside
  # the host, matching the internal-only trust model (D-18/T-04-14). Image
  # pinned to a specific published tag (not :latest) per supply-chain hygiene
  # (T-04-15) — verified against Docker Hub's tag list at plan time.
  asynqmon:
    image: hibiken/asynqmon:0.7.2
    platform: linux/amd64
    container_name: octoconv-asynqmon
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "127.0.0.1:8980:8080"

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
